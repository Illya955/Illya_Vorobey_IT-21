<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Завдання 3</title>
</head>
<body>
<script>
let a=8, b=3, c=12;

console.log("Завдання 3");
console.log("Найбільше:", Math.max(a,b,c));
console.log("Найменше:", Math.min(a,b,c));
console.log("Хоча б одне парне:", (a%2===0)||(b%2===0)||(c%2===0));
console.log("Складна умова (a>b && b<c):", (a>b)&&(b<c));

let n=7, prime=true;
for(let i=2;i<n;i++){ if(n%i===0){ prime=false; break; } }
console.log("Число", n, "просте:", prime);
</script>
